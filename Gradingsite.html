<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Check Station</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background .25s;background:#1a1a2e}
#overlay.green{background:#00c853}
#overlay.red{background:#d50000}
#scanner-box{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;padding:24px;max-height:100vh;overflow-y:auto}
#station-label{font-size:14px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5)}
#supplier-bar{font-size:15px;font-weight:700;color:white;background:rgba(0,0,0,.3);padding:8px 18px;border-radius:10px;display:flex;align-items:center;gap:12px}
#supplier-bar span{opacity:.7;font-weight:400}
#change-sup-btn{padding:5px 12px;border:1px solid rgba(255,255,255,.4);border-radius:8px;background:transparent;color:white;font-size:12px;cursor:pointer}
#change-sup-btn:hover{background:rgba(255,255,255,.15)}
#barcode-input{width:min(520px,90vw);height:60px;font-size:26px;font-weight:700;text-align:center;letter-spacing:4px;border:4px solid rgba(255,255,255,.3);border-radius:16px;background:rgba(255,255,255,.12);color:white;outline:none;caret-color:white}
#barcode-input::placeholder{color:rgba(255,255,255,.35);font-size:16px;font-weight:400;letter-spacing:1px}
#barcode-input:focus{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.18)}
#feedback{text-align:center;width:min(800px,94vw);display:flex;flex-direction:column;align-items:center;gap:12px}
#feedback-title{font-size:clamp(28px,5vw,60px);font-weight:900;color:white;line-height:1.1;text-shadow:0 4px 20px rgba(0,0,0,.3);display:none}
#feedback-subtitle{font-size:clamp(15px,2.4vw,24px);font-weight:600;color:rgba(255,255,255,.93);line-height:1.55;display:none;white-space:pre-line}
#green-msg{font-size:clamp(20px,3.5vw,40px);font-weight:800;color:white;display:none;text-align:center}
#scan-hint{font-size:13px;color:rgba(255,255,255,.38);letter-spacing:1px}
#barcode-display{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.4);display:none}

/* Grade panel */
#grade-panel{display:none;flex-direction:column;align-items:center;gap:10px;width:min(560px,92vw)}
#grade-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.g-btn{padding:14px 10px;border:3px solid rgba(255,255,255,.45);border-radius:14px;background:rgba(255,255,255,.13);color:white;font-size:18px;font-weight:800;cursor:pointer;min-width:110px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background .15s}
.g-btn .sc{font-size:11px;opacity:.65;font-weight:600}
.g-btn:hover{background:rgba(255,255,255,.28);border-color:white}

/* Escape/back button */
#escape-btn{padding:10px 20px;border:2px solid rgba(255,255,255,.35);border-radius:12px;background:rgba(0,0,0,.25);color:rgba(255,255,255,.75);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .15s;margin-top:4px}
#escape-btn:hover{background:rgba(0,0,0,.45);border-color:rgba(255,255,255,.6);color:white}

/* Sub panel */
#sub-panel{display:none;flex-direction:column;align-items:center;gap:10px;width:min(500px,92vw)}
#sub-question{font-size:16px;font-weight:700;color:white;text-align:center}
#sub-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.s-btn{padding:13px 16px;border:3px solid rgba(255,255,255,.45);border-radius:14px;background:rgba(255,255,255,.13);color:white;font-size:16px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background .15s;min-width:120px}
.s-btn .sc{font-size:11px;opacity:.65}
.s-btn:hover{background:rgba(255,255,255,.28);border-color:white}
#custom-input-wrap{display:none;flex-direction:column;align-items:center;gap:8px;width:100%}
#custom-input{width:100%;padding:12px 16px;font-size:16px;border-radius:12px;border:none;outline:none;font-weight:600}
#custom-confirm{padding:10px 24px;background:#00c853;color:white;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer}

/* Escape in sub panel */
#escape-btn-sub{padding:8px 18px;border:2px solid rgba(255,255,255,.35);border-radius:12px;background:rgba(0,0,0,.25);color:rgba(255,255,255,.75);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .15s;margin-top:2px}
#escape-btn-sub:hover{background:rgba(0,0,0,.45);border-color:rgba(255,255,255,.6);color:white}

/* Sync indicator */
#sync-indicator{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:white;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;z-index:9999;display:none;letter-spacing:1px}
#sync-indicator.syncing{display:block;background:rgba(255,165,0,.7)}
#sync-indicator.ok{display:block;background:rgba(0,200,83,.7)}
#sync-indicator.err{display:block;background:rgba(213,0,0,.7)}

/* Counter */
#scan-counter{position:fixed;top:16px;right:16px;color:white;font-size:16px;font-weight:700;background:rgba(0,0,0,.35);padding:8px 14px;border-radius:12px;z-index:9999}
/* Ctrl buttons */
.ctrl-btn{position:fixed;right:16px;padding:11px 16px;border:none;border-radius:12px;font-weight:700;cursor:pointer;z-index:9999;font-size:14px}
#reset-btn{bottom:60px;background:#ff3b3b;color:white}
#close-btn{bottom:16px;background:#333;color:white}
/* Lang indicator */
#lang-ind{position:fixed;top:16px;left:16px;color:white;font-size:13px;font-weight:700;background:rgba(0,0,0,.35);padding:7px 12px;border-radius:10px;z-index:9999}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:99999;padding:16px}
.modal-box{background:#1a1a2e;border:2px solid rgba(255,255,255,.18);border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;gap:14px;align-items:center;width:min(400px,96vw)}
.modal-box h2{color:white;font-size:20px;font-weight:800;letter-spacing:1px;text-align:center}
.m-input{width:100%;padding:13px 16px;font-size:18px;border-radius:12px;border:none;outline:none;font-weight:700;text-align:center}
.m-btn{padding:12px 28px;background:#00c853;color:white;border:none;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;width:100%}
.m-btn:hover{background:#00a844}
/* lang picker */
.lang-grid{display:flex;gap:10px}
.lp{padding:10px 20px;border:2px solid rgba(255,255,255,.35);border-radius:10px;background:transparent;color:white;font-size:16px;font-weight:700;cursor:pointer}
.lp.active{background:rgba(255,255,255,.22);border-color:white}
/* supplier search */
#sup-search{width:100%;padding:11px 14px;font-size:16px;border-radius:10px;border:none;outline:none;font-weight:600}
#sup-list{width:100%;max-height:200px;overflow-y:auto;border-radius:10px;background:white;display:none}
.sup-item{padding:10px 14px;cursor:pointer;font-size:15px;font-weight:600;color:#1a1a2e;border-bottom:1px solid #eee}
.sup-item:hover{background:#e8f5e9}

/* offline queue badge */
#queue-badge{position:fixed;bottom:100px;right:16px;background:rgba(255,165,0,.85);color:white;font-size:12px;font-weight:800;padding:6px 12px;border-radius:10px;z-index:9999;display:none}
</style>
</head>
<body>

<!-- MODALS -->
<div class="modal" id="m-lang">
  <div class="modal-box">
    <h2 id="ml-title">Choose your language / Kies je taal</h2>
    <div class="lang-grid">
      <button class="lp" data-lang="nl">🇳🇱 NL</button>
      <button class="lp" data-lang="en">🇬🇧 EN</button>
      <button class="lp" data-lang="ar">🇸🇦 AR</button>
    </div>
    <button class="m-btn" id="ml-confirm">Confirm</button>
  </div>
</div>

<div class="modal" id="m-name" style="display:none">
  <div class="modal-box">
    <h2 id="mn-title">Wat is je naam?</h2>
    <input class="m-input" id="name-inp" type="text" autocomplete="off" spellcheck="false"/>
    <button class="m-btn" id="mn-confirm">Verder →</button>
  </div>
</div>

<div class="modal" id="m-init" style="display:none">
  <div class="modal-box">
    <h2 id="mi-title">Wat zijn je initialen?</h2>
    <input class="m-input" id="init-inp" type="text" maxlength="5" autocomplete="off" spellcheck="false"/>
    <button class="m-btn" id="mi-confirm">Verder →</button>
  </div>
</div>

<div class="modal" id="m-sup" style="display:none">
  <div class="modal-box">
    <h2 id="ms-title">Kies leverancier</h2>
    <input id="sup-search" type="text" placeholder="Zoek of typ..." autocomplete="off" spellcheck="false"/>
    <div id="sup-list"></div>
    <div style="color:rgba(255,255,255,.5);font-size:12px;text-align:center" id="ms-hint">Selecteer een leverancier om door te gaan</div>
  </div>
</div>

<!-- UI -->
<div id="lang-ind">NL</div>
<div id="scan-counter">Scans: 0</div>
<div id="sync-indicator">⟳ Syncing...</div>
<div id="queue-badge">📤 <span id="queue-count">0</span> wachtend</div>

<div id="overlay">
  <div id="scanner-box">
    <div id="station-label">● Grading Check Station</div>
    <div id="supplier-bar" style="display:none">
      <span id="ms-label">Leverancier:</span>
      <strong id="cur-supplier"></strong>
      <button id="change-sup-btn">↺ Wissel</button>
    </div>
    <input id="barcode-input" type="text" placeholder="Scan barcode..." autocomplete="off" autocorrect="off" spellcheck="false" autocomplete="new-password"/>
    <div id="feedback">
      <div id="green-msg"></div>
      <div id="feedback-title"></div>
      <div id="feedback-subtitle"></div>
    </div>
    <div id="grade-panel">
      <div id="grade-row">
        <button class="g-btn" data-g="A"><span class="sc">1</span><span id="gl-A"></span></button>
        <button class="g-btn" data-g="B"><span class="sc">2</span><span id="gl-B"></span></button>
        <button class="g-btn" data-g="C"><span class="sc">3</span><span id="gl-C"></span></button>
        <button class="g-btn" data-g="D-rep"><span class="sc">4</span><span id="gl-D"></span></button>
        <button class="g-btn" data-g="D-def"><span class="sc">5</span><span id="gl-E"></span></button>
      </div>
      <button id="escape-btn">⎋ Terug</button>
    </div>
    <div id="sub-panel">
      <div id="sub-question"></div>
      <div id="sub-row">
        <button class="s-btn" id="sub-already"><span class="sc">1</span><span id="sub-al-lbl"></span></button>
        <button class="s-btn" id="sub-custom"><span class="sc">2</span><span id="sub-cu-lbl"></span></button>
      </div>
      <div id="custom-input-wrap">
        <input id="custom-input" type="text" autocomplete="off" spellcheck="false"/>
        <button id="custom-confirm"></button>
      </div>
      <button id="escape-btn-sub">⎋ Terug</button>
    </div>
    <div id="barcode-display"></div>
    <div id="scan-hint"></div>
  </div>
</div>

<audio id="alert-sound" preload="auto"><source src="Gradingsound.mp3" type="audio/mpeg"></audio>
<button class="ctrl-btn" id="reset-btn">Nieuwe sessie</button>
<button class="ctrl-btn" id="close-btn">Afsluiten</button>

function t(k){return (T[activeLang||'nl']||T['nl'])[k]||'';}

function applyLang(){
  if(!activeLang) activeLang='nl';
  langInd.textContent = activeLang.toUpperCase();
  document.querySelectorAll('.lp').forEach(b=>b.classList.toggle('active',b.dataset.lang===activeLang));
  document.querySelector('#m-name h2').textContent   = t('nameQ');
  document.getElementById('name-inp').placeholder    = t('namePh');
  document.querySelector('#mn-confirm').textContent  = t('next');
  document.querySelector('#m-init h2').textContent   = t('initQ');
  document.getElementById('init-inp').placeholder    = t('initPh');
  document.querySelector('#mi-confirm').textContent  = t('next');
  document.querySelector('#m-sup h2').textContent    = t('supQ');
  supSearch.placeholder = t('supPh');
  document.getElementById('ms-hint').textContent     = t('supHint');
  document.getElementById('ms-label').textContent    = t('supLabel');
  document.getElementById('change-sup-btn').textContent = t('supChange');
  scanHintEl.textContent = t('scanHint');
  greenMsg.textContent   = t('green');

  document.getElementById('gl-A').textContent = gl[0];
  document.getElementById('gl-B').textContent = gl[1];
  document.getElementById('gl-C').textContent = gl[2];
  document.getElementById('gl-D').textContent = gl[3];

  custConfirm.textContent = t('customOk');
  escapeBtnGrade.textContent = t('back');
  escapeBtnSub.textContent   = t('back');
}

// ── Modal flow ────────────────────────────────────────────────────────
function showModal(id){['m-lang','m-name','m-init','m-sup'].forEach(m=>document.getElementById(m).style.display=m===id?'flex':'none');}
function hideAllModals(){['m-lang','m-name','m-init','m-sup'].forEach(m=>document.getElementById(m).style.display='none');}

function startFlow(){
  if(!activeLang){showModal('m-lang');return;}
  applyLang();
  if(!userName){showModal('m-name');document.getElementById('name-inp').focus();return;}
  if(!userInit){showModal('m-init');document.getElementById('init-inp').focus();return;}
  if(!supplier){showModal('m-sup');renderSupList('');supSearch.value='';supSearch.focus();return;}
  hideAllModals();
  showSupBar();
  updateCounter(false); // refresh display without incrementing
  focusInput();
  flushOfflineQueue(); // try to send any queued items
}

// Supplier
function renderSupList(q){
  const fil = suppliers.filter(s=>s.toLowerCase().includes(q.toLowerCase()));
  supList.innerHTML='';
  if(!fil.length){supList.style.display='none';return;}
  supList.style.display='block';
  fil.slice(0,80).forEach(s=>{
    const d=document.createElement('div');
    d.className='sup-item'; d.textContent=s;
    d.addEventListener('click',()=>selectSupplier(s));
    supList.appendChild(d);
  });
}
function selectSupplier(s){
  supplier=s; localStorage.setItem('supplier',supplier);
  hideAllModals(); showSupBar(); focusInput();
}
supSearch.addEventListener('input',()=>renderSupList(supSearch.value));
supSearch.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const first=supList.querySelector('.sup-item');
    if(first) first.click();
  }
});
document.getElementById('change-sup-btn').addEventListener('click',()=>{
  showModal('m-sup'); renderSupList(''); supSearch.value=''; supSearch.focus();
});
function showSupBar(){
  curSupEl.textContent=supplier;

}

// ── Sync to Google Sheets ─────────────────────────────────────────────
function showSync(state,msg){
  syncInd.className = state;
  syncInd.textContent = msg;
  syncInd.style.display = 'block';
  if(state==='ok'||state==='err'){
    setTimeout(()=>{syncInd.style.display='none';},3000);
  }
}

async function sendToSheets(row){
  showSync('syncing', t('syncing'));
  try {
    const res = await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(row)
    });
    // no-cors always returns opaque response — we assume success
    showSync('ok', t('syncOk'));
    return true;
  } catch(err){
    showSync('err', t('syncErr'));
    return false;
  }
}

async function flushOfflineQueue(){
  if(!offlineQueue.length) return;
  const toSend = [...offlineQueue];
  for(let i=0;i<toSend.length;i++){
    const ok = await sendToSheets(toSend[i]);
    if(ok){
      offlineQueue.shift();
      localStorage.setItem('offlineQueue',JSON.stringify(offlineQueue));
      updateQueueBadge();
    } else {
      break; // stop if network is down
    }
  }
}

function updateQueueBadge(){
  if(offlineQueue.length>0){
    queueBadge.style.display='block';
    queueCount.textContent=offlineQueue.length;
  } else {
    queueBadge.style.display='none';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────
function getGradingText(raw){
  if(!raw) return '';
  const parts=raw.replace(/^\||\|$/g,'').split('|').map(s=>s.trim()).filter(Boolean);
  return parts[{nl:0,en:1,ar:2}[activeLang]??0]||parts[0]||'';
}
function nowDate(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}
function nowTime(){
  const d=new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function focusInput(){
  const anyModal=['m-lang','m-name','m-init','m-sup'].some(id=>document.getElementById(id).style.display!=='none');
  if(anyModal||gradePanel.style.display==='flex'||subPanel.style.display==='flex') return;
  bInput.focus();
}

// Counter: pass increment=true only when a grade is fully completed
function updateCounter(increment){
  if(increment){
    totalScans++;
    localStorage.setItem('totalScans',totalScans);
  }
  scanCtr.textContent=`Scans: ${totalScans}`;
}

  pendingScan=null; pendingGrade=null;
  hideGradePanel();
  subPanel.style.display='none';
  custWrap.style.display='none';
  showIdle();
  focusInput();
}

escapeBtnGrade.addEventListener('click', cancelScan);
escapeBtnSub.addEventListener('click', ()=>{
  // go back to grade panel, not all the way out
  subPanel.style.display='none';
  custWrap.style.display='none';
  pendingGrade=null;
  showGradePanel();
});

  overlay.className='green';
  greenMsg.style.display='block';
  fbTitle.style.display='none'; fbSub.style.display='none';
  bcDisp.style.display='none'; scanHintEl.style.display='none';
}
function showRed(product,barcode){
  overlay.className='red';
  fbTitle.textContent=product['Tags']||product.tags||''; fbTitle.style.display='block';
  const txt=getGradingText(product['Grading']||product['Grading Tekst']||'');
  if(txt){fbSub.textContent=txt;fbSub.style.display='block';fbSub.style.direction=activeLang==='ar'?'rtl':'ltr';}
  else fbSub.style.display='none';
  greenMsg.style.display='none';
  bcDisp.textContent=barcode; bcDisp.style.display='block';
  scanHintEl.style.display='none';
  sound.currentTime=0; sound.play().catch(()=>{});
}
function showIdle(){
  overlay.className='';
  greenMsg.style.display='none'; fbTitle.style.display='none';
  fbSub.style.display='none'; bcDisp.style.display='none';
  scanHintEl.style.display='block';
}

  gradePanel.style.display='flex';
  subPanel.style.display='none';
  custWrap.style.display='none';

  btn.addEventListener('click',()=>handleGrade(btn.dataset.g));
});

function handleGrade(g){
  if(g==='D-rep'||g==='D-def'){
    pendingGrade=g;
    hideGradePanel();
    showSubPanel(g);
  } else {
    commitScan(g, gradeWords[g], '', '');
  }
}

// ── Sub panel ─────────────────────────────────────────────────────────
function showSubPanel(g){
  subPanel.style.display='flex';
  custWrap.style.display='none';
  if(g==='D-rep'){
    subQ.textContent=t('repQ');
    document.getElementById('sub-al-lbl').textContent=t('repGiven');
    document.getElementById('sub-cu-lbl').textContent=t('repCustom');
  } else {
    subQ.textContent=t('defQ');
    document.getElementById('sub-al-lbl').textContent=t('defGiven');
    document.getElementById('sub-cu-lbl').textContent=t('defCustom');
  }
}

subCustom.addEventListener('click',()=>{

  if(!reason) return;

});

// ── Commit scan ───────────────────────────────────────────────────────
async function commitScan(statusCode, statusWord, extraInfo, _unused){
  if(!pendingScan) return;

  const g = pendingGrade;
  const infoRep = (g==='D-rep') ? extraInfo : '';
  const infoDef = (g==='D-def') ? extraInfo : '';

  const row = {
    sessionId,
    userName,
    userInit,
    supplier,
    barcode: pendingScan.barcode,
    type: pendingScan.isGrading ? 'Grading' : 'Normal',
    Status_product_code: statusCode,
    Status_product_word: statusWord,
    Info_reparatie: infoRep,
    Info_defect: infoDef,
    date: nowDate(),
    time: nowTime()
  };

  // increment counter NOW (grading is complete)
  updateCounter(true);

  // reset state
  pendingScan=null; pendingGrade=null;
  subPanel.style.display='none';
  hideGradePanel();
  custWrap.style.display='none';
  showIdle();
  focusInput();

  // send to Sheets (with offline fallback)
  const ok = await sendToSheets(row);
  if(!ok){
    offlineQueue.push(row);
    localStorage.setItem('offlineQueue',JSON.stringify(offlineQueue));
    updateQueueBadge();
  } else {
    // try to flush any previously queued items
    flushOfflineQueue();
  }
}

// ── Scan handler ──────────────────────────────────────────────────────
function handleScan(barcode){
  const code=barcode.trim();
  if(!code) return;
  if(gradePanel.style.display==='flex'||subPanel.style.display==='flex') return;

  const splitMatch = (val) => val ? val.split(',').map(s=>s.trim()).filter(s=>s.length>3).includes(code) : false;
  const found=productData.find(p=>
    splitMatch(p['Barcode']) ||
    splitMatch(p['Productcode']) ||
    splitMatch(p['Artikelcode']) ||
    splitMatch(p['Productcode leverancier'])
  );

  pendingScan={barcode:code, isGrading:!!(found&&(found['Tags']||found.tags||'').toLowerCase().includes('grading')), product:found||null};
  pendingGrade=null;

  found ? showRed(found,code) : showGreen();
  showGradePanel();
  bInput.value='';
}

bInput.addEventListener('keydown',e=>{if(e.key==='Enter') handleScan(bInput.value);});
bInput.addEventListener('change',()=>{if(bInput.value.trim()) handleScan(bInput.value);});

// ── Keyboard shortcuts ────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const anyModal=['m-lang','m-name','m-init','m-sup'].some(id=>document.getElementById(id).style.display!=='none');
  if(anyModal) return;

  // Escape key = cancel/back in all panels
  if(e.key==='Escape'){
    e.preventDefault();
    if(subPanel.style.display==='flex'){
      // go back to grade panel
      subPanel.style.display='none';
      custWrap.style.display='none';
      pendingGrade=null;
      showGradePanel();
    } else if(gradePanel.style.display==='flex'){
      cancelScan();
    }
    return;
  }

  if(custWrap.style.display==='flex') return;

  if(gradePanel.style.display==='flex'){
    const map={'1':'A','2':'B','3':'C','4':'D-rep','5':'D-def'};
    if(map[e.key]){e.preventDefault();handleGrade(map[e.key]);}
    return;
  }
  if(subPanel.style.display==='flex'){
    if(e.key==='1'){e.preventDefault();subAlready.click();}
    if(e.key==='2'){e.preventDefault();subCustom.click();}
    return;
  }
  if(document.activeElement!==bInput) bInput.focus();
});

document.addEventListener('click',e=>{
  if(!e.target.closest('.modal-box')&&!e.target.closest('.ctrl-btn')&&!e.target.closest('#grade-panel')&&!e.target.closest('#sub-panel')) focusInput();
});

// ── Reset ─────────────────────────────────────────────────────────────
function doReset(){
  sessionId=genId(); totalScans=0;
  userName=''; userInit=''; supplier='';
  offlineQueue=[];
  ['sessionId','totalScans','offlineQueue','userName','userInit','supplier','activeLang'].forEach(k=>localStorage.removeItem(k));
  localStorage.setItem('sessionId',sessionId);
  localStorage.setItem('totalScans','0');
  localStorage.setItem('offlineQueue','[]');
  activeLang='';
  langInd.textContent='NL';
  scanCtr.textContent='Scans: 0';
  queueBadge.style.display='none';
  pendingScan=null; pendingGrade=null;
  hideGradePanel(); subPanel.style.display='none'; custWrap.style.display='none';
  supplierBar.style.display='none';
  showIdle();
  startFlow();
}

document.getElementById('reset-btn').addEventListener('click',()=>{
  if(!confirm(t('resetConfirm'))) return;
  doReset();
});
document.getElementById('close-btn').addEventListener('click',()=>{
  if(!confirm(t('closeConfirm'))) return;
  window.close();
});

// ── Init ──────────────────────────────────────────────────────────────
updateQueueBadge();
scanCtr.textContent=`Scans: ${totalScans}`;
if(activeLang) applyLang();
startFlow();

// Retry offline queue every 30s
setInterval(flushOfflineQueue, 30000);
</script>
</body>
